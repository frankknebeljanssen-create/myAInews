name: Curate news

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: curate
  cancel-in-progress: false

jobs:
  curate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run curator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python curate.py

      - name: Commit + push results
        run: |
          git config user.name "myAInews bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json run_log.json
          git diff --staged --quiet || git commit -m "auto: curated news $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
